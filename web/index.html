<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily News Agent</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Daily News Agent</h1>
        <p>本地新闻简报控制台</p>
      </div>
      <nav class="tabs" aria-label="主要视图">
        <button class="tab is-active" type="button" data-view="setup">设置</button>
        <button class="tab" type="button" data-view="preview">预览</button>
        <button class="tab" type="button" data-view="logs">日志</button>
      </nav>
    </header>

    <main class="workspace">
      <section class="panel setup-panel" data-panel="setup">
        <div class="panel-heading">
          <h2>用户配置</h2>
          <span id="secretStatus" class="status-dot">读取中</span>
        </div>

        <form id="settingsForm" class="settings-grid">
          <fieldset>
            <legend>模型与时间</legend>
            <label><span>OpenAI API Key</span><input name="OPENAI_API_KEY" type="password" autocomplete="off" placeholder="留空则保留现有值" /></label>
            <label><span>模型</span><input name="NEWS_AGENT_MODEL" value="gpt-5.4" /></label>
            <div class="two-col">
              <label><span>时区</span><input name="NEWS_TIMEZONE" value="Asia/Shanghai" /></label>
              <label><span>每日时间</span><input name="NEWS_RUN_TIME" type="time" value="09:00" /></label>
            </div>
            <div class="two-col">
              <label><span>候选新闻数</span><input name="NEWS_MAX_ARTICLES" type="number" min="20" max="200" value="80" /></label>
              <label><span>最终条数</span><input name="NEWS_STORY_LIMIT" type="number" min="3" max="20" value="12" /></label>
            </div>
          </fieldset>

          <fieldset>
            <legend>邮件配置</legend>
            <label><span>收件邮箱</span><input name="NEWS_EMAIL_TO" type="email" multiple placeholder="receiver@example.com, second@example.com" /></label>
            <label><span>发件邮箱</span><input name="NEWS_EMAIL_FROM" type="email" placeholder="sender@gmail.com" /></label>
            <label><span>SMTP 账号</span><input name="SMTP_USER" type="email" placeholder="通常等于发件邮箱" /></label>
            <label><span>SMTP 授权码</span><input name="SMTP_PASSWORD" type="password" autocomplete="off" placeholder="留空则保留现有值" /></label>
            <div class="smtp-row">
              <label><span>SMTP 服务器</span><input name="SMTP_HOST" value="smtp.gmail.com" /></label>
              <label><span>端口</span><input name="SMTP_PORT" type="number" value="587" /></label>
              <label class="toggle-row"><input name="SMTP_USE_SSL" type="checkbox" /><span>SSL 直连</span></label>
            </div>
          </fieldset>

          <fieldset class="wide-fieldset">
            <legend>新闻偏好</legend>
            <div class="topic-grid" id="topicGrid">
              <label><input type="checkbox" value="全球头条" checked /> 全球头条</label>
              <label><input type="checkbox" value="科技与AI" checked /> 科技与 AI</label>
              <label><input type="checkbox" value="地缘政治" checked /> 地缘政治</label>
              <label><input type="checkbox" value="宏观经济与市场" checked /> 宏观市场</label>
              <label><input type="checkbox" value="加密货币政策" checked /> 加密政策</label>
              <label><input type="checkbox" value="中国与全球贸易科技关系" checked /> 中国与全球</label>
              <label><input type="checkbox" value="世界杯与重大体育事件" checked /> 世界杯/体育</label>
              <label><input type="checkbox" value="商业与大公司" checked /> 商业大公司</label>
            </div>
            <label><span>自定义主题</span><textarea name="NEWS_TOPICS" rows="3"></textarea></label>
            <label><span>邮件要求</span><textarea name="NEWS_EMAIL_REQUIREMENTS" rows="4" placeholder="例如：中文输出；每条说明为什么重要；最后给出今日关注；语气直接；5分钟内读完。"></textarea></label>
          </fieldset>
        </form>
      </section>

      <aside class="panel action-panel" data-panel="preview">
        <div class="panel-heading"><h2>预览与发送</h2><span id="runStatus" class="status-dot muted">待运行</span></div>
        <div class="action-buttons">
          <button id="saveButton" class="secondary" type="button">保存设置</button>
          <button id="previewButton" class="primary" type="button">生成预览</button>
          <button id="sendButton" class="danger" type="button">发送邮件</button>
        </div>
        <div class="result-meta">
          <div><span>主题</span><strong id="subjectText">暂无</strong></div>
          <div><span>候选</span><strong id="articleCount">0</strong></div>
        </div>
        <pre id="briefingOutput" class="briefing-output">配置完成后，先点“生成预览”。</pre>
      </aside>

      <section class="panel log-panel" data-panel="logs">
        <div class="panel-heading"><h2>运行日志</h2><button id="clearLogs" class="icon-button" type="button">清空</button></div>
        <div id="logs" class="logs"></div>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
